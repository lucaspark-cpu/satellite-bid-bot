name: G2B Satellite Bid Notice Bot

on:
  schedule:
    # 평일 매일 한국 시간(KST) 오전 9시에 정기 실행 (UTC 기준 0시 0분)
    - cron: '0 0 * * 1-5'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 💡 @v3에서 @v4로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # 💡 @v4에서 @v5로 업데이트
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run G2B Bot Script
        run: python g2b_bot_gmail.py
