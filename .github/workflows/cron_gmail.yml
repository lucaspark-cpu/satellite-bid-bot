name: G2B Satellite Bid Notice Bot

on:
  schedule:
    # 💡 UTC 23:30 = 한국 시간(KST) 평일(월~금) 아침 08:30 분산 트래픽 지연을 고려한 조기 기동
    - cron: '30 23 * * 0-4'
  workflow_dispatch:      # 수동 실행(Run workflow) 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4.1.7 # Node.js 24 경고 대응 최신 버전 유지

      - name: Python 환경 설정
        uses: actions/setup-python@v5.1.1 # Node.js 24 경고 대응 최신 버전 유지
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: G2B 봇 스크립트 실행 및 메일 발송
        # 💡 파이썬 코드 내부에서 직접 하드코딩된 SERVICE_KEY와 SENDER_PASSWORD를 쓰고 있으므로,
        # 깃허브 액션 환경에서는 메일 발송 기능이 정상 작동하도록 최소한의 실행 구문만 깔끔하게 유지합니다.
        run: python g2b_bot_gmail.py
