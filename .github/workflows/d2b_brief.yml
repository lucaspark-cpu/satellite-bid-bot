name: D2B Satellite Bid Notice Bot

on:
  schedule:
    - cron: '30 23 * * 0-4'  # UTC 23:30 = 한국 시간(KST) 평일(월~금) 아침 08:30 지연 성능을 감안해 자동 실행
  workflow_dispatch:      # 수동 실행(Run workflow) 버튼 활성화
    inputs:
      receiver_email:
        description: '메일 받을 주소들을 쉼표(,)로 구분해서 적어주세요. (예: aaa@com, bbb@com)'
        required: false
        default: ''
        type: string

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: D2B 브리핑 스크립트 실행 및 메일 발송
      env:
        DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        # 수동 입력값이 있으면 우선 사용하고, 없으면 변수나 백업 주소로 연동
        RECEIVER_EMAIL: ${{ inputs.receiver_email != '' && inputs.receiver_email || secrets.RECEIVER_EMAIL }}
      run: python defense_brief.py
