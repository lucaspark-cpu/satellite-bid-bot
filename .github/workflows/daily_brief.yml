name: Dabeeo Unified Bid Notice Cron Engine

on:
  schedule:
    # KST 기준 평일 월요일 및 목요일 오전 08:30 정각 크론 자동화 구동 스펙
    # 월요일 오전 08:30 -> 일요일 UTC 23:30 (cron: '30 23 * * 0')
    # 목요일 오전 08:30 -> 수요일 UTC 23:30 (cron: '30 23 * * 3')
    - cron: '30 23 * * 0,3'
  workflow_dispatch: # 수동 즉시 강제 발송 실행 단추 지원

jobs:
  execute-intelligence-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Python 3.10 환경 구성
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 오픈 API 호출용 requests 모듈 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 다비오 통합 비즈니스 인텔리전스 엔진 가동
      env:
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      run: python dabeeo_bid_master.py
