name: Daily Defense Tech Briefing

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = KST 09:00 (매일 아침 9시 정각)
  workflow_dispatch:      # 필요할 때 수동으로 즉시 실행할 수 있는 버튼 추가

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 브리핑 스크립트 실행 및 메일 발송
      env:
        DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }} # 생략 시 발신 이메일로 자동 전송
      run: python defense_brief.py
