name: Dabeeo Unified Bid Notice Cron Engine

on:
  schedule:
    # 💡 UTC 23:30 = 한국 표준시(KST) 월요일 및 목요일 오전 08:30 정각 발송 스케줄러 보장
    # 월요일 오전 08:30 실행 -> 일요일 UTC 23:30 (cron: '30 23 * * 0')
    # 목요일 오전 08:30 실행 -> 수요일 UTC 23:30 (cron: '30 23 * * 3')
    - cron: '30 23 * * 0,3'
  workflow_dispatch: # 수동 실행(Run workflow) 버튼 활성화

jobs:
  execute-intelligence-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Python 3.10 런타임 환경설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 의존성 패키지(requests) 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 다비오 통합 비즈니스 인텔리전스 엔진 가동
      env:
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      run: python dabeeo_bid_master.py
