name: Daily Defense Tech Briefing

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 아침 9시 정각 자동 실행
  workflow_dispatch:      # 수동 실행 시 입력창 호출
    inputs:
      receiver_email:
        description: '메일 받을 주소들을 쉼표(,)로 구분해서 적어주세요. (예: aaa@com, bbb@com)'
        required: false
        default: ''
        type: string

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 브리핑 스크립트 실행 및 메일 발송
      env:
        DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        RECEIVER_EMAIL: ${{ inputs.receiver_email || secrets.RECEIVER_EMAIL }}
      run: python defense_brief.py
